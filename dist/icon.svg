<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0051A8;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="3" dy="6" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="shine_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:1" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="46" fill="url(#bg_grad)"/>

  <path d="M30 150 C 60 145, 90 120, 110 90 T 175 40 L 175 160 C 145 155, 115 155, 85 155 Z" fill="white" fill-opacity="0.1" filter="url(#glassBlur)"/>
  <path d="M30 150 C 60 145, 90 120, 110 90 T 175 40" stroke="white" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.3"/>
  <path d="M155 40 H 175 V 60" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>

  <g filter="url(#shadow)">
    <rect x="52" y="78" width="96" height="70" rx="30" fill="white"/>
    
    <rect x="52" y="78" width="96" height="28" rx="30" fill="url(#shine_grad)" opacity="0.3"/>
    
    <path d="M70 78 C 70 60, 92 60, 92 78" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="1"/>
    <path d="M108 78 C 108 60, 130 60, 130 78" fill="#F0F0F0" stroke="#E0E0E0" stroke-width="1"/>
    
    <rect x="76" y="70" width="10" height="4" rx="2" fill="#333" opacity="0.8"/>
    <rect x="114" y="70" width="10" height="4" rx="2" fill="#333" opacity="0.8"/>
    
    <circle cx="100" cy="115" r="3" fill="#34C759"/>
    
    <path d="M52 100 H 148" stroke="#F0F0F0" stroke-width="1.5"/>
  </g>

  <text x="160" y="170" font-family="Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">$</text>
  <circle cx="160" cy="162" r="24" stroke="white" stroke-width="3" stroke-opacity="0.2" fill="none"/>
</svg>
